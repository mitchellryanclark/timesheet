<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Timesheet</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <style>
        #notification-bar {
            position: fixed; top: -100px; left: 0; width: 100%;
            background-color: #28a745; color: white; text-align: center;
            padding: 15px; font-weight: bold; transition: top 0.5s; z-index: 1000;
        }
        .time-box { background: #e9ecef; padding: 10px; border-radius: 5px; margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body style="font-family: sans-serif; margin: 20px; max-width: 450px;">

    <div id="notification-bar">Verification: Time Logged!</div>
    <h2>Rush Timesheet Tracker</h2>

    <button id="mic-btn" style="padding: 15px; width: 100%; background-color: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 20px; cursor: pointer;">
        🎤 Tap to Speak
    </button>

    <label>Date:</label><br>
    <input type="date" id="date" style="width: 100%; padding: 8px; margin-top: 5px;"><br><br>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Start Time:</label><br>
            <input type="time" id="start-time" class="time-input" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="flex: 1;">
            <label>End Time:</label><br>
            <input type="time" id="end-time" class="time-input" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
    </div>

    <div id="auto-calc-display" class="time-box">Total: 0.00 hours</div>
    <br>

    <label>Pay Type:</label><br>
    <select id="pay-type" style="width: 100%; padding: 8px; margin-top: 5px;">
        <option value="Regular">Regular</option>
        <option value="Vacay Pay">Vacay Pay</option>
        <option value="Holiday Pay">Holiday Pay</option>
        <option value="Sick Day">Sick Day</option>
    </select><br><br>

    <button id="add-btn" style="padding: 12px; font-weight: bold; background-color: #007bff; color: white; border: none; border-radius: 6px; width: 100%; cursor: pointer;">Log Hours Locally</button>

    <h3>History:</h3>
    <div id="log-display" style="background: #f0f0f0; padding: 15px; border-radius: 8px; line-height: 1.6;"></div>

    <script>
        const notification = (msg) => {
            const bar = document.getElementById('notification-bar');
            bar.innerText = msg; bar.style.top = "0";
            setTimeout(() => bar.style.top = "-100px", 4000);
        };

        function format12h(t) {
            if(!t) return "";
            let [h, m] = t.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM';
            return (h % 12 || 12) + ":" + m + " " + ampm;
        }

        function updateLiveCalc() {
            const s = document.getElementById('start-time').value;
            const e = document.getElementById('end-time').value;
            if (s && e) {
                let start = s.split(':'), end = e.split(':');
                let diff = ((parseInt(end[0])*60)+parseInt(end[1])) - ((parseInt(start[0])*60)+parseInt(start[1]));
                if (diff < 0) diff += 1440;
                document.getElementById('auto-calc-display').innerHTML = `Total: <strong>${(diff/60).toFixed(2)}</strong> hours`;
            }
        }

        // Listen for manual changes to auto-update calc
        document.querySelectorAll('.time-input').forEach(input => {
            input.addEventListener('input', updateLiveCalc);
        });

        function parseVoiceTime(text) {
            const match = text.match(/(\d{1,2})[:\s]?(\d{2})?/);
            if (!match) return null;
            let h = parseInt(match[1]);
            let m = match[2] ? parseInt(match[2]) : 0;
            // Simple logic: if hour is 1-7, assume PM for workdays
            if (h >= 1 && h <= 7 && !text.includes("am")) h += 12;
            return h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            document.getElementById('mic-btn').onclick = () => { recognition.start(); };
            
            recognition.onresult = (event) => {
                const speech = event.results[0][0].transcript.toLowerCase();
                document.getElementById('date').valueAsDate = new Date();
                
                // ADJUSTMENT LOGIC
                if (speech.includes("started at") || speech.includes("start time to") || speech.includes("clock in")) {
                    const time = speech.includes("at") || speech.includes("to") ? parseVoiceTime(speech) : null;
                    const finalTime = time || ( () => {
                        const now = new Date();
                        let m = Math.round(now.getMinutes() / 5) * 5;
                        let h = now.getHours();
                        if(m===60) { m=0; h++; }
                        return h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
                    })();
                    document.getElementById('start-time').value = finalTime;
                    notification("✅ Start: " + format12h(finalTime));
                }

                if (speech.includes("left at") || speech.includes("end time to") || speech.includes("clock out")) {
                    const time = speech.includes("at") || speech.includes("to") ? parseVoiceTime(speech) : null;
                    const finalTime = time || ( () => {
                        const now = new Date();
                        let m = Math.round(now.getMinutes() / 5) * 5;
                        let h = now.getHours();
                        if(m===60) { m=0; h++; }
                        return h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
                    })();
                    document.getElementById('end-time').value = finalTime;
                    notification("✅ End: " + format12h(finalTime));
                }
                updateLiveCalc();
            };
        }

        document.getElementById("add-btn").onclick = () => {
            const d = document.getElementById("date").value;
            const s = document.getElementById("start-time").value;
            const e = document.getElementById("end-time").value;
            if (!d || !s || !e) return alert("Missing data!");
            const row = `<div>📅 ${d} | 🕒 ${format12h(s)} - ${format12h(e)}</div>`;
            document.getElementById("log-display").innerHTML += row;
            notification("💾 Saved to History");
        };
    </script>
</body>
</html>
