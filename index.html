<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Timesheet</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#28a745">

    <style>
        #notification-bar {
            position: fixed;
            top: -100px;
            left: 0;
            width: 100%;
            background-color: #28a745;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            transition: top 0.5s ease-in-out;
            z-index: 1000;
        }
    </style>
</head>
<body style="font-family: sans-serif; margin: 20px; max-width: 450px;">

    <div id="notification-bar">Verification: Time Logged!</div>

    <h2>Rush Timesheet Tracker</h2>

    <button id="mic-btn" style="padding: 15px; width: 100%; background-color: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 20px; cursor: pointer;">
        🎤 Tap to Speak
    </button>

    <label>Date:</label><br>
    <input type="date" id="date" style="width: 100%; padding: 8px; margin-top: 5px;"><br><br>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Start Time:</label><br>
            <input type="time" id="start-time" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="flex: 1;">
            <label>End Time:</label><br>
            <input type="time" id="end-time" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
    </div><br>

    <label>Pay Type:</label><br>
    <select id="pay-type" style="width: 100%; padding: 8px; margin-top: 5px;">
        <option value="Regular">Regular</option>
        <option value="Vacay Pay">Vacay Pay</option>
        <option value="Holiday Pay">Holiday Pay</option>
        <option value="Sick Day">Sick Day</option>
    </select><br><br>

    <button id="add-btn" style="padding: 12px; font-weight: bold; background-color: #007bff; color: white; border: none; border-radius: 6px; width: 100%; cursor: pointer;">Log Hours Locally</button>

    <h3>Logged Hours:</h3>
    <div id="log-display" style="background: #f0f0f0; padding: 15px; min-height: 100px; border-radius: 8px; line-height: 1.6;"></div>

    <script>
        function showNotification(message) {
            const bar = document.getElementById('notification-bar');
            bar.innerText = message;
            bar.style.top = "0";
            setTimeout(() => { bar.style.top = "-100px"; }, 5000);
        }

        function formatTime12h(timeStr) {
            if (!timeStr) return "N/A";
            let [hours, minutes] = timeStr.split(':');
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return hours + ":" + minutes + " " + ampm;
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const [year, month, day] = dateStr.split('-');
            return month + "/" + day + "/" + year;
        }

        function getRoundedTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = Math.round(now.getMinutes() / 5) * 5;
            if (minutes === 60) { minutes = 0; hours = (hours + 1) % 24; }
            return hours.toString().padStart(2, '0') + ":" + minutes.toString().padStart(2, '0');
        }

        function calculateHours(startTime, endTime) {
            if (!startTime || !endTime) return "0.00";
            let start = startTime.split(':');
            let end = endTime.split(':');
            let startMins = (parseInt(start[0]) * 60) + parseInt(start[1]);
            let endMins = (parseInt(end[0]) * 60) + parseInt(end[1]);
            let diff = endMins - startMins;
            if (diff < 0) diff += 24 * 60; 
            return (diff / 60).toFixed(2);
        }

        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            micBtn.addEventListener('click', () => {
                recognition.start();
                micBtn.innerText = "Listening...";
                micBtn.style.backgroundColor = "#dc3545";
            });

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase();
                micBtn.innerText = "🎤 Tap to Speak";
                micBtn.style.backgroundColor = "#28a745";
                document.getElementById('date').valueAsDate = new Date();

                if (transcript.includes("got to work") || transcript.includes("started") || transcript.includes("clock in")) {
                    const t = getRoundedTime();
                    document.getElementById('start-time').value = t;
                    showNotification("✅ Start Time set to " + formatTime12h(t));
                }
                if (transcript.includes("left work") || transcript.includes("finished") || transcript.includes("clock out")) {
                    const t = getRoundedTime();
                    document.getElementById('end-time').value = t;
                    showNotification("✅ End Time set to " + formatTime12h(t));
                }
            };
        }

        document.getElementById("add-btn").addEventListener("click", function() {
            const d = document.getElementById("date").value;
            const s = document.getElementById("start-time").value;
            const e = document.getElementById("end-time").value;
            const p = document.getElementById("pay-type").value;
            if (!d) return alert("Please select a date.");
            const total = calculateHours(s, e);
            const row = `<div>📅 ${formatDate(d)} | 🕒 ${formatTime12h(s)} - ${formatTime12h(e)} | 💰 <strong>${total} hrs</strong></div>`;
            document.getElementById("log-display").innerHTML += row;
            showNotification("💾 Hours Logged Locally!");
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", (e) => {});');
        }
    </script>
</body>
</html>
