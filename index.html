<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Timesheet</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2091/2091665.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#28a745">
</head>

<body>

    <div id="notification-bar">Syncing...</div>

    <div class="card">
        <h2>Rush Timesheet</h2>
        <button id="mic-btn" class="btn-main">🎤 Tap to Speak</button>

        <label>Date:</label>
        <input type="date" id="date">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Start Time:</label>
                <input type="time" id="start-time" class="time-input">
            </div>
            <div style="flex: 1;">
                <label>End Time:</label>
                <input type="time" id="end-time" class="time-input">
            </div>
        </div>

        <label>Lunch Deduction (Hours):</label>
        <input type="number" id="lunch-break" step="0.25" value="0" placeholder="e.g. 0.5">
        <small
            style="display: block; margin-top: -12px; margin-bottom: 12px; font-size: 11px; color: var(--text-muted);">0.5
            = 30m, 0.75 = 45m</small>

        <div id="auto-calc-display" class="time-box">Total: 0.00 hours</div>
        <br>

        <label>Pay Type:</label>
        <select id="pay-type">
            <option value="Regular">Regular</option>
            <option value="Vacay Pay">Vacay Pay</option>
            <option value="Holiday Pay">Holiday Pay</option>
            <option value="Sick Day">Sick Day</option>
        </select>

        <button id="add-btn" class="btn-main">Save & Sync to Drive</button>
        <button id="clear-btn" class="btn-main">Clear Screen</button>
    </div>

    <div class="card">
        <h3>History Calendar</h3>
        <div id="calendar-controls">
            <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
            <span id="current-month" style="font-weight:bold; color: #2c3e50;"></span>
            <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div id="calendar-grid"></div>
    </div>

    <div class="card" style="border-left: 5px solid #8e44ad;">
        <h3>Finalize Invoice</h3>
        <p class="helper-text">Select a date on the calendar, then tap Authorize to generate the PDF for that pay
            period.</p>
        <div style="display: flex; gap: 10px; flex-direction: column;">
            <button id="auth-btn" class="btn-main">📑 1. Generate & Review</button>
            <button id="send-employer-btn" class="btn-main" style="background-color: #d35400;">📤 2. Approve & Send to
                Employer</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
    <script src="app.js"></script>
</body>

</html>
