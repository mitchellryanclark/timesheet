<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Timesheet</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <style>
        #notification-bar {
            position: fixed; top: -100px; left: 0; width: 100%;
            background-color: #28a745; color: white; text-align: center;
            padding: 15px; font-weight: bold; transition: top 0.5s; z-index: 1000;
        }
        .time-box { background: #e9ecef; padding: 10px; border-radius: 5px; margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body style="font-family: sans-serif; margin: 20px; max-width: 450px;">

    <div id="notification-bar">Verification: Time Logged!</div>
    <h2>Rush Timesheet Tracker</h2>

    <button id="mic-btn" style="padding: 15px; width: 100%; background-color: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 20px; cursor: pointer;">
        🎤 Tap to Speak
    </button>

    <label>Date:</label><br>
    <input type="date" id="date" style="width: 100%; padding: 8px; margin-top: 5px;"><br><br>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Start Time:</label><br>
            <input type="time" id="start-time" class="time-input" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="flex: 1;">
            <label>End Time:</label><br>
            <input type="time" id="end-time" class="time-input" style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
    </div>

    <div id="auto-calc-display" class="time-box">Total: 0.00 hours</div>
    <br>

    <button id="add-btn" style="padding: 12px; font-weight: bold; background-color: #007bff; color: white; border: none; border-radius: 6px; width: 100%; cursor: pointer;">Log Hours Locally</button>

    <script>
        const notification = (msg) => {
            const bar = document.getElementById('notification-bar');
            bar.innerText = msg; bar.style.top = "0";
            setTimeout(() => bar.style.top = "-100px", 4000);
        };

        function format12h(t) {
            if(!t) return "";
            let [h, m] = t.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM';
            return (h % 12 || 12) + ":" + m + " " + ampm;
        }

        function updateLiveCalc() {
            const s = document.getElementById('start-time').value;
            const e = document.getElementById('end-time').value;
            if (s && e) {
                let start = s.split(':'), end = e.split(':');
                let startMins = (parseInt(start[0]) * 60) + parseInt(start[1]);
                let endMins = (parseInt(end[0]) * 60) + parseInt(end[1]);
                let diff = endMins - startMins;
                if (diff < 0) diff += 1440;
                document.getElementById('auto-calc-display').innerHTML = `Total: <strong>${(diff/60).toFixed(2)}</strong> hours`;
            }
        }

        document.querySelectorAll('.time-input').forEach(i => i.oninput = updateLiveCalc);

        function parseVoiceTime(text, isRange = false) {
            const numMap = {"one":"1","two":"2","three":"3","four":"4","five":"5","six":"6","seven":"7","eight":"8","nine":"9","ten":"10","eleven":"11","twelve":"12"};
            for(let w in numMap) {
                text = text.replace(new RegExp('\\b' + w + '\\b', 'g'), numMap[w]);
            }

            text = text.replace(/quarter to (\d{1,2})/, (m, h) => {
                let hr = parseInt(h) - 1;
                if(hr <= 0) hr += 12;
                return hr + ":45";
            });
            text = text.replace(/quarter past (\d{1,2})/, (m, h) => h + ":15");
            text = text.replace(/half past (\d{1,2})/, (m, h) => h + ":30");

            if (/\bnoon\b/.test(text)) return "12:00";
            if (/\bmidnight\b/.test(text)) return "00:00";

            let isAM = /am|a\.m\.|morning/.test(text);
            let isPM = /pm|p\.m\.|evening|night|tonight|afternoon/.test(text);

            let cleanText = text.replace(/\b(january|february|march|april|may|june|july|august|september|october|november|december)\b/g, '');
            cleanText = cleanText.replace(/\b\d{1,2}(st|nd|rd|th)\b/g, ''); 
            cleanText = cleanText.replace(/on the \d{1,2}/g, '');
            cleanText = cleanText.replace(/yesterday|today/g, '');
            cleanText = cleanText.replace(/(last\s+)?(sunday|monday|tuesday|wednesday|thursday|friday|saturday)/g, '');

            const match = cleanText.match(/(\d{1,2})[:\s]?(\d{2})?/);
            if (!match) return null;

            let h = parseInt(match[1]);
            let m = match[2] ? parseInt(match[2]) : 0;
            
            if (isAM) {
                if (h === 12) h = 0;
            } else if (isPM) {
                if (h < 12) h += 12;
            } else {
                if (isRange) {
                    if (h >= 1 && h <= 5) h += 12; 
                } else {
                    if (new Date().getHours() >= 12 && h < 12) h += 12; 
                }
            }
            return h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
        }

        // Duration logic for Chronology Checker
        function optimizeShift(anchorTime, newTime, isSettingStart) {
            let [ah, am] = anchorTime.split(':').map(Number);
            let [nh, nm] = newTime.split(':').map(Number);
            
            let anchorMins = ah * 60 + am;
            let opt1Mins = nh * 60 + nm;
            let opt2Mins = (nh < 12 ? nh + 12 : nh - 12) * 60 + nm; // Flipped AM/PM
            
            let dur1 = isSettingStart ? anchorMins - opt1Mins : opt1Mins - anchorMins;
            if (dur1 < 0) dur1 += 1440; // overnight check
            
            let dur2 = isSettingStart ? anchorMins - opt2Mins : opt2Mins - anchorMins;
            if (dur2 < 0) dur2 += 1440;
            
            // If the flipped time creates a shift shorter than 14 hours AND shorter than the original, use it.
            if (dur2 < 840 && dur2 < dur1) {
                let bestH = Math.floor(opt2Mins / 60);
                return bestH.toString().padStart(2, '0') + ":" + nm.toString().padStart(2, '0');
            }
            return newTime;
        }

        const monthMap = {"january": 0, "february": 1, "march": 2, "april": 3, "may": 4, "june": 5, "july": 6, "august": 7, "september": 8, "october": 9, "november": 10, "december": 11};
        const daysOfWeek = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            document.getElementById('mic-btn').onclick = () => { recognition.start(); };
            
            recognition.onresult = (event) => {
                const speech = event.results[0][0].transcript.toLowerCase();
                const dateField = document.getElementById('date');
                const hasExplicitAMPM = /am|a\.m\.|pm|p\.m\.|morning|night|evening|afternoon/.test(speech);

                // A. Parse Date & Explicit Months & Weekdays
                let targetDate = new Date();
                let dateFound = false;

                if (speech.includes("yesterday")) {
                    targetDate.setDate(targetDate.getDate() - 1);
                    dateFound = true;
                } else {
                    const monthMatch = speech.match(/(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{1,2})/);
                    const dayMatch = speech.match(/(?:on )?(?:the )?(\d{1,2})(?:st|nd|rd|th)/) || speech.match(/on the (\d{1,2})/);
                    const weekdayMatch = speech.match(/(last\s+)?(sunday|monday|tuesday|wednesday|thursday|friday|saturday)/);

                    if (monthMatch) {
                        targetDate.setMonth(monthMap[monthMatch[1]]);
                        targetDate.setDate(parseInt(monthMatch[2]));
                        dateFound = true;
                    } else if (weekdayMatch) {
                        let isLast = !!weekdayMatch[1];
                        let spokenDay = daysOfWeek.indexOf(weekdayMatch[2]);
                        let todayDay = targetDate.getDay();
                        let daysAgo = todayDay - spokenDay;
                        
                        if (daysAgo <= 0) daysAgo += 7; // Force it into the past
                        if (isLast) daysAgo += 7; // Go back one additional week
                        
                        targetDate.setDate(targetDate.getDate() - daysAgo);
                        dateFound = true;
                    } else if (dayMatch) {
                        targetDate.setDate(parseInt(dayMatch[1]));
                        dateFound = true;
                    } else if (speech.includes("today")) {
                        dateFound = true;
                    }
                }
                
                const y = targetDate.getFullYear();
                const mo = String(targetDate.getMonth() + 1).padStart(2, '0');
                const d = String(targetDate.getDate()).padStart(2, '0');
                
                if (dateFound) {
                   dateField.value = `${y}-${mo}-${d}`; 
                } else if (!dateField.value) {
                   dateField.value = `${y}-${mo}-${d}`; 
                }

                // B. Parse Range or Single Time
                let handledAsRange = false;
                
                if (!speech.includes("change")) {
                    const rangeMatch = speech.match(/(?:from\s+)?(.*?)\s+(?:to|until|till|through)\s+(.*)/);
                    if (rangeMatch) {
                        const startT = parseVoiceTime(rangeMatch[1], true);
                        const endT = parseVoiceTime(rangeMatch[2], true);
                        
                        if (startT && endT) {
                            document.getElementById('start-time').value = startT;
                            document.getElementById('end-time').value = endT;
                            notification("✅ Range Set");
                            handledAsRange = true;
                        }
                    }
                }

                if (!handledAsRange) {
                    const isStart = /started|start|clock in|got to work/.test(speech) || (speech.includes("change") && speech.includes("start"));
                    const isEnd = /left|end|finished|clock out/.test(speech) || (speech.includes("change") && speech.includes("end"));
                    const time = parseVoiceTime(speech, false);

                    let finalTime = time || ( () => {
                        const now = new Date();
                        let min = Math.round(now.getMinutes() / 5) * 5;
                        let hr = now.getHours();
                        if(min===60) { min=0; hr++; }
                        return hr.toString().padStart(2, '0') + ":" + min.toString().padStart(2, '0');
                    })();

                    // Chronology Checker (Duration-based)
                    if (isStart) {
                        let currentEnd = document.getElementById('end-time').value;
                        if (currentEnd && !hasExplicitAMPM) {
                            finalTime = optimizeShift(currentEnd, finalTime, true);
                        }
                        document.getElementById('start-time').value = finalTime;
                        notification("✅ Start: " + format12h(finalTime));
                    } else if (isEnd) {
                        let currentStart = document.getElementById('start-time').value;
                        if (currentStart && !hasExplicitAMPM) {
                            finalTime = optimizeShift(currentStart, finalTime, false);
                        }
                        document.getElementById('end-time').value = finalTime;
                        notification("✅ End: " + format12h(finalTime));
                    }
                }
                updateLiveCalc();
            };
        }
    </script>
</body>
</html>
